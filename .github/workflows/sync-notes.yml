name: Sync LPU_GenAI Notes

# Mon-Fri, 10:00 and 16:00 IST (UTC+5:30)
# = 04:30 and 10:30 UTC
on:
  schedule:
    - cron: "30 4 * * 1-5"
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

# Prevent multiple runs from pushing simultaneously
concurrency:
  group: sync-lpu-notes
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check end date
        id: gate
        run: |
          today=$(date -u +%Y-%m-%d)
          cutoff="2026-07-31"

          if [[ "$today" > "$cutoff" ]]; then
            echo "Past cutoff ($cutoff); skipping sync."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.gate.outputs.skip == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice
          pip install requests Pillow

      - name: Sync notes from source repo
        if: steps.gate.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_notes.py

      - name: Commit and push if changed
        if: steps.gate.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "NotBOT"
          git config --global user.email "notbot@users.noreply.github.com"

          git add Notes

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: sync notes from v0idgy/LPU_GenAI"

          # Get latest remote changes
          git fetch origin main
          git rebase origin/main

          # First push attempt
          if ! git push origin HEAD:main; then
            echo "Push failed, retrying..."

            git fetch origin main
            git rebase origin/main

            git push origin HEAD:main
          fi

      - name: Disable workflow after cutoff
        if: steps.gate.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow disable "sync-notes.yml" \
            --repo "$GITHUB_REPOSITORY"
